<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b3d2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Poker Ride" />
  <title>Poker Ride</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <!-- Optional QR decoder. If lib/jsQR.min.js is present, live camera scanning
       works on every phone (including iPhone). If it is absent, the app still
       works using the native scanner (Android) or the manual station buttons. -->
  <script src="lib/jsQR.min.js" onerror="window.__jsqrMissing=true"></script>
</head>
<body>
  <div id="app">

    <!-- ============ START SCREEN ============ -->
    <section id="screen-start" class="screen active">
      <div class="brand">
        <div class="brand-suit">&#9824;&#9829;&#9827;&#9830;</div>
        <h1>Poker Ride</h1>
        <p class="tagline">Scan a station. Draw a card. Best hand at the finish wins.</p>
      </div>
      <form id="start-form" class="card-panel" autocomplete="off">
        <div id="name-inputs-container"></div>
        <button type="button" id="add-hand-btn" class="btn btn-ghost add-hand-btn">
          ＋ ADD HAND
        </button>
        <button type="submit" class="btn btn-primary">Start Ride</button>
      </form>
      <button id="resume-btn" class="btn btn-ghost hidden">Resume current ride</button>
      <p class="fineprint">Works offline. Add to your Home Screen for the best experience.</p>
    </section>

    <!-- ============ SCAN SCREEN ============ -->
    <section id="screen-scan" class="screen">
      <header class="topbar">
        <button class="icon-btn" data-nav="start" aria-label="Back">&#8592;</button>
        <span class="topbar-title" id="scan-topbar-title">Scan station</span>
        <button class="icon-btn" data-nav="hand" aria-label="View hand">&#9824;</button>
      </header>

      <!-- Player tabs — hidden for single player, visible for multi -->
      <div id="player-tabs" class="player-tabs hidden"></div>

      <div class="scan-wrap">
        <!-- Tap-to-start overlay — visible first; hidden once camera is running.
             Giving iOS a real tap event is required for the camera permission
             dialog to appear on older iPhones (6s / iOS 12-15). -->
        <div id="camera-start-overlay" class="camera-start-overlay">
          <button id="camera-start-btn" type="button" class="camera-start-btn">
            📷<br>Tap to Start Camera
          </button>
        </div>
        <video id="scan-video" playsinline muted></video>
        <div id="qr-reader" class="hidden"></div>
        <div class="scan-frame hidden"></div>
        <canvas id="scan-canvas" class="hidden"></canvas>
      </div>

      <p id="scan-status" class="scan-status">Point your camera at the station QR code.</p>
      <button id="camera-retry-btn" class="btn btn-ghost hidden" style="margin:0 0 6px;">
        📷 Try Camera Again
      </button>

      <div class="manual-block">
        <p class="manual-label">No camera? Tap your station:</p>
        <div id="manual-stations" class="manual-grid"></div>
      </div>
    </section>

    <!-- ============ CARD DISPLAY SCREEN ============ -->
    <section id="screen-card" class="screen">
      <header class="topbar">
        <button class="icon-btn" data-nav="scan" aria-label="Back to scan">&#8592;</button>
        <span class="topbar-title" id="card-station-title">Station</span>
        <button class="icon-btn" data-nav="hand" aria-label="View hand">&#9824;</button>
      </header>

      <div class="card-stage">
        <div id="playing-card" class="playing-card">
          <span class="pc-rank pc-top"></span>
          <span class="pc-suit-big"></span>
          <span class="pc-rank pc-bottom"></span>
        </div>
        <p id="card-caption" class="card-caption"></p>
        <p id="card-progress" class="card-progress"></p>
      </div>

      <div class="actions">
        <button class="btn btn-primary" data-nav="scan">Next Station</button>
        <button class="btn btn-ghost" data-nav="hand">View My Hand</button>
      </div>
    </section>

    <!-- ============ FINAL HAND SCREEN ============ -->
    <section id="screen-hand" class="screen">
      <header class="topbar">
        <button class="icon-btn" data-nav="scan" aria-label="Back to scan">&#8592;</button>
        <span class="topbar-title">My Hand</span>
        <span class="icon-btn" aria-hidden="true"></span>
      </header>

      <div class="hand-stage" id="hand-stage">
        <!-- populated dynamically by renderHand() for each player -->
      </div>

      <div class="actions">
        <button class="btn btn-primary" data-nav="scan">Back to Scanning</button>
        <button id="restart-btn" class="btn btn-danger">Restart Ride</button>
      </div>
    </section>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- QR-code GENERATOR — download qrcode.min.js and place in lib/
       Get it from: https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js -->
  <script src="lib/qrcode.min.js" onerror="window.__qrcodeMissing=true"></script>
  <script src="app.js"></script>
</body>
</html>
